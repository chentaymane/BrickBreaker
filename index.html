<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Brick Breaker - Start</title>
        <link rel="icon" type="image/svg+xml" href="favicon.svg" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <canvas id="bg-canvas"></canvas>

        <div id="hud" class="hidden">
            <span id="level-display">LEVEL: 1</span>
            <span id="score-display">SCORE: 0</span>
            <span id="timer-display">TIME: 60</span>
            <span id="lives-display">LIVES: 3</span>
        </div>

        <div id="game-container" class="hidden"></div>

        <div id="menu-container" class="menu-container">
            <h1 class="game-title">BRICK BREAKER</h1>

            <div class="menu-art">
                <div class="mini-ball"></div>
                <div class="mini-paddle"></div>
            </div>

            <button class="start-button">START GAME</button>

            <div class="tutorial">
                <div class="tut-item">
                    <div class="tut-keys"><kbd>←</kbd><kbd>→</kbd></div>
                    <span class="tut-label">Move</span>
                </div>
                <div class="tut-sep"></div>
                <div class="tut-item">
                    <div class="tut-keys"><kbd class="key-wide">SPACE</kbd></div>
                    <span class="tut-label">Launch</span>
                </div>
                <div class="tut-sep"></div>
                <div class="tut-item">
                    <svg class="tut-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>
                    <span class="tut-label">Multi-Ball</span>
                </div>
                <div class="tut-sep"></div>
                <div class="tut-item">
                    <svg class="tut-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M13.5.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67z"/></svg>
                    <span class="tut-label">Fireball</span>
                </div>
            </div>
        </div>

        <div class="pause-container">
            <button id="pause-btn" hidden>PAUSE</button>
            <button class="musical icon-btn" id="music-btn" title="Toggle Music">
                <svg viewBox="0 0 24 24" fill="currentColor" width="1em" height="1em">
                    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                </svg>
            </button>
            <button class="effects icon-btn" id="effect-btn" title="Toggle SFX">
                <svg viewBox="0 0 24 24" fill="currentColor" width="1em" height="1em">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                </svg>
            </button>

            <div id="pause-overlay" class="hidden">
                <div class="overlay-content">
                    <h2>PAUSED</h2>
                    <button class="resume-btn">RESUME</button>
                    <div class="audio-row">
                        <button class="audio-toggle musical">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="1em" height="1em">
                                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                            </svg>
                            <span class="audio-label">MUSIC</span>
                        </button>
                        <button class="audio-toggle effects">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="1em" height="1em">
                                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                            </svg>
                            <span class="audio-label">SFX</span>
                        </button>
                    </div>
                    <button class="restart-btn">RESTART</button>
                </div>
            </div>
        </div>

        <div id="win-overlay" class="hidden">
            <div class="overlay-content">
                <h2 class="win-title">YOU WIN!</h2>
                <p id="win-score" class="final-score">SCORE: 0</p>
                <button class="restart-btn win">PLAY AGAIN</button>
            </div>
        </div>

        <div id="gameover-overlay" class="hidden">
            <div class="overlay-content">
                <h2 class="gameover-title">GAME OVER</h2>
                <p id="gameover-score" class="final-score">SCORE: 0</p>
                <button class="restart-btn">PLAY AGAIN</button>
            </div>
        </div>

        <script src="script/background.js"></script>
        <script src="script/constants.js"></script>
        <script src="script/state.js"></script>
        <script src="script/game.js"></script>
        <script src="script/sounds.js"></script>
        <script src="script/events.js"></script>
    </body>
</html>
