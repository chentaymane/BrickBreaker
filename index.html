<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Breaker - Start</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="hud" class="hidden">
        <span id="level-display">LEVEL: 1</span>
        <span id="score-display">SCORE: 0</span>
        <span id="lives-display">LIVES: 3</span>
    </div>

    <div id="game-container" class="hidden"></div>

    <div id="menu-container" class="menu-container">
        <h1 class="game-title">BRICK BREAKER</h1>

        <div class="menu-art">
            <div class="mini-ball"></div>
            <div class="mini-paddle"></div>
        </div>

        <button class="start-button">START GAME</button>
        <p class="controls-hint">Use Arrows to Move</p>
    </div>

    <div class="pause-container">
        <button id="pause-btn" hidden> PAUSE</button>

        <div id="pause-overlay" class="hidden">
            <div class="overlay-content">
                <h2>PAUSED</h2>
                <button class="resume-btn">RESUME</button>
                <button class="restart-btn">RESTART</button>
            </div>
        </div>
    </div>

    <div id="win-overlay" class="hidden">
        <div class="overlay-content">
            <h2 class="win-title">YOU WIN!</h2>
            <p id="win-score" class="final-score">SCORE: 0</p>
            <button class="restart-btn">PLAY AGAIN</button>
        </div>
    </div>

    <div id="gameover-overlay" class="hidden">
        <div class="overlay-content">
            <h2 class="gameover-title">GAME OVER</h2>
            <p id="gameover-score" class="final-score">SCORE: 0</p>
            <button class="restart-btn">PLAY AGAIN</button>
        </div>
    </div>

    <script src="script/background.js"></script>
    <script src="script/constants.js"></script>
    <script src="script/state.js"></script>
    <script src="script/game.js"></script>
    <script src="script/events.js"></script>
</body>
